<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }

  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 520px;
    padding: 8px 16px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 8px;
  }

  .game-header .title {
    color: #e94560;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .game-header .stats {
    display: flex;
    gap: 20px;
    color: #c0c0c0;
    font-size: 14px;
  }

  .game-header .stats span {
    color: #f0c040;
    font-weight: bold;
  }

  canvas {
    border: 3px solid #0f3460;
    border-radius: 4px;
    background: #0a0a0a;
    display: block;
  }

  .game-footer {
    color: #606060;
    font-size: 12px;
    text-align: center;
  }

  .game-footer kbd {
    background: #333;
    color: #ccc;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid #555;
    font-size: 11px;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }

  .overlay .panel {
    background: #16213e;
    border: 2px solid #e94560;
    border-radius: 12px;
    padding: 30px 40px;
    text-align: center;
    color: #fff;
    animation: pop 0.3s ease-out;
  }

  @keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .overlay .panel h2 {
    color: #e94560;
    margin-bottom: 16px;
    font-size: 26px;
  }

  .overlay .panel p {
    color: #aaa;
    margin: 8px 0;
    font-size: 14px;
  }

  .overlay .panel .score-final {
    color: #f0c040;
    font-size: 32px;
    font-weight: bold;
    margin: 12px 0;
  }

  .btn {
    display: inline-block;
    margin-top: 16px;
    padding: 10px 30px;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    font-family: inherit;
  }

  .btn:hover {
    background: #ff6b81;
    transform: scale(1.05);
  }

  .btn:active {
    transform: scale(0.95);
  }
</style>
</head>

<div class="game-wrapper">

// ---------- 音效系统 (使用振荡器) ----------
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, duration, type = 'square', vol = 0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playSound(200, 0.1, 'square', 0.06); }
function sfxHit() { playSound(80, 0.15, 'sawtooth', 0.08); }
function sfxExplosion() { playSound(40, 0.3, 'sawtooth', 0.12); }
function sfxPowerUp() { playSound(600, 0.1, 'square', 0.07); playSound(800, 0.1, 'square', 0.07); }

// ---------- 游戏状态 ----------

window.addEventListener('keydown', e => {
  keys[e.key] = true;

  }
  if (e.key === 'r' || e.key === 'R') { restartGame(); }
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });

// ---------- 地图数据 ----------

// 当前地图
let map = [];
let mapWidth = COLS;
let mapHeight = ROWS;

// ---------- 方向枚举 ----------
const DIR_UP = 0;
const DIR_RIGHT = 1;
const DIR_DOWN = 2;
const DIR_LEFT = 3;
const dx = [0, 1, 0, -1];
const dy = [-1, 0, 1, 0];

// ---------- 游戏对象 ----------
class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x;           // 像素坐标 (中心)
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? PLAYER_SPEED : ENEMY_SPEED;
    this.alive = true;
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 15 : 40;
    this.bullets = [];
    this.animTimer = 0;
    // 敌人 AI
    this.aiDirTimer = 0;
    this.aiDirDuration = 60;
    this.aiShootTimer = 0;
  }

  getRect() {
    return {
      left: this.x - HALF_TANK,
      top: this.y - HALF_TANK,
      right: this.x + HALF_TANK,
      bottom: this.y + HALF_TANK,
    };
  }

  collidesWith(otherRect) {
    const r = this.getRect();
    return !(r.right <= otherRect.left || r.left >= otherRect.right ||
             r.bottom <= otherRect.top || r.top >= otherRect.bottom);
  }
}

let player = null;
let enemies = [];
let powerUps = [];
let particles = [];

// ---------- 子弹 ----------
class Bullet {
  constructor(x, y, dir, owner) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.owner = owner; // 'player' | 'enemy'
    this.alive = true;
  }

  getRect() {
    return { left: this.x - 2, top: this.y - 2, right: this.x + 2, bottom: this.y + 2 };
  }

  collidesWith(otherRect) {
    const r = this.getRect();
    return !(r.right <= otherRect.left || r.left >= otherRect.right ||
             r.bottom <= otherRect.top || r.top >= otherRect.bottom);
  }
}

let allBullets = [];

// ---------- 粒子效果 ----------
class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.life = 20;
    this.maxLife = 20;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
  }
}

// ---------- 道具 ----------
class PowerUp {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type; // 'star' | 'shield' | 'bomb' | 'clock'
    this.alive = true;
    this.timer = 0;
  }
  getRect() {
    return { left: this.x - 10, top: this.y - 10, right: this.x + 10, bottom: this.y + 10 };
  }
}

// ---------- 地图工具函数 ----------
function getTile(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return -1;
  return map[row * COLS + col];
}

function setTile(col, row, val) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  map[row * COLS + col] = val;
}

function isSolid(tile) {
  return tile === 1 || tile === 2 || tile === 5;
}

function getTileRect(col, row) {
  return {
    left: col * TILE_SIZE,
    top: row * TILE_SIZE,
    right: (col + 1) * TILE_SIZE,
    bottom: (row + 1) * TILE_SIZE,
  };
}

function collidesWithMap(rect, ignoreTiles) {
  const leftCol = Math.floor(rect.left / TILE_SIZE);
  const rightCol = Math.floor((rect.right - 0.01) / TILE_SIZE);
  const topRow = Math.floor(rect.top / TILE_SIZE);
  const bottomRow = Math.floor((rect.bottom - 0.01) / TILE_SIZE);

  for (let row = topRow; row <= bottomRow; row++) {
    for (let col = leftCol; col <= rightCol; col++) {
      const tile = getTile(col, row);
      if (isSolid(tile)) {
        // 如果坦克当前已经压在这个格子上，允许它移走（逃脱路径）
        if (ignoreTiles && ignoreTiles.has(col + ',' + row)) continue;
        return { col, row, tile };
      }
    }
  }
  return null;
}

// ---------- 初始化 / 重置 ----------
function loadMap(levelIndex) {
  const src = LEVEL_MAPS[levelIndex % LEVEL_MAPS.length];
  map = [...src];
}

function spawnPlayer() {
  // 出生在底部中央空地区域（避免与地图固体块重叠）
  player = new Tank(10 * TILE_SIZE + TILE_SIZE / 2, 18 * TILE_SIZE + TILE_SIZE / 2, DIR_UP, '#4ade80', true);
}

function spawnEnemies(count) {
  enemies = [];
  // 6个独立出生点，每个敌人独享一个，绝不重叠
  const spawnPoints = [
    { x: 1, y: 0 }, { x: 5, y: 0 }, { x: 9, y: 0 },
    { x: 13, y: 0 }, { x: 16, y: 0 }, { x: 19, y: 0 },
  ];
  for (let i = 0; i < count && i < spawnPoints.length; i++) {
    const pt = spawnPoints[i];
    const ex = pt.x * TILE_SIZE + TILE_SIZE / 2;
    const ey = pt.y * TILE_SIZE + TILE_SIZE / 2;
    enemies.push(new Tank(ex, ey, DIR_DOWN, '#ef4444', false));
  }
}

function spawnPowerUp(x, y) {
  const types = ['star', 'shield', 'bomb', 'clock'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerUps.push(new PowerUp(x, y, type));
}

function restartGame() {
  initAudio();
  score = 0;
  lives = 3;
  wave = 1;
  gameRunning = true;
  gamePaused = false;
  gameOver = false;
  victoryShown = false;
  particles = [];
  powerUps = [];
  allBullets = [];
  loadMap(0);
  spawnPlayer();
  spawnEnemies(4);
  updateUI();
  overlay.style.display = 'none';
}

function nextWave() {
  wave++;
  allBullets = [];
  powerUps = [];
  particles = [];
  loadMap(wave - 1);
  spawnPlayer();
  const enemyCount = Math.min(3 + wave, 8);
  spawnEnemies(enemyCount);
  updateUI();
}

function updateUI() {
  scoreDisplay.textContent = score;
  livesDisplay.textContent = player && player.alive ? lives : 0;
  waveDisplay.textContent = wave;
  enemyCountDisplay.textContent = enemies.filter(e => e.alive).length;
}

// ---------- 碰撞检测 ----------
function checkCollision(tank, dx, dy) {
  const testRect = {
    left: tank.x + dx - HALF_TANK,
    top: tank.y + dy - HALF_TANK,
    right: tank.x + dx + HALF_TANK,
    bottom: tank.y + dy + HALF_TANK,
  };

  // 边界检测
  if (testRect.left < 0 || testRect.right > W ||
      testRect.top < 0 || testRect.bottom > H) {
    return true;
  }

  // 地图碰撞（跳过坦克当前压住的格子，防止卡死在墙内）
  const curRect = tank.getRect();
  const ignoreTiles = new Set();
  const clc = Math.floor(curRect.left / TILE_SIZE);
  const crc = Math.floor((curRect.right - 0.01) / TILE_SIZE);
  const ctr = Math.floor(curRect.top / TILE_SIZE);
  const cbr = Math.floor((curRect.bottom - 0.01) / TILE_SIZE);
  for (let r = ctr; r <= cbr; r++) {
    for (let c = clc; c <= crc; c++) {
      const ct = getTile(c, r);
      if (isSolid(ct)) ignoreTiles.add(c + ',' + r);
    }
  }
  if (collidesWithMap(testRect, ignoreTiles)) return true;

  // 坦克碰撞
  const allTanks = tank.isPlayer ? enemies : [player, ...enemies.filter(e => e !== tank && e.alive)];
  for (const other of allTanks) {
    if (!other || !other.alive) continue;
    if (other === tank) continue;
    const otherRect = other.getRect();
    if (!(testRect.right <= otherRect.left || testRect.left >= otherRect.right ||
          testRect.bottom <= otherRect.top || testRect.top >= otherRect.bottom)) {
      return true;
    }
  }

  return false;
}

// ---------- 射击 ----------
function shoot(tank, owner) {
  if (tank.shootCooldown > 0) return;
  const bx = tank.x + dx[tank.dir] * HALF_TANK;
  const by = tank.y + dy[tank.dir] * HALF_TANK;
  allBullets.push(new Bullet(bx, by, tank.dir, owner));
  tank.shootCooldown = tank.shootDelay;
  if (owner === 'player') sfxShoot();
}

// ---------- 更新逻辑 ----------
function update() {
  if (!gameRunning || gamePaused || gameOver) return;

  // ---- 玩家移动 ----
  if (player && player.alive) {
    let moved = false;
    let targetDir = player.dir;

    if (keys['ArrowUp'] || keys['w'] || keys['W']) { targetDir = DIR_UP; moved = true; }
    else if (keys['ArrowDown'] || keys['s'] || keys['S']) { targetDir = DIR_DOWN; moved = true; }
    else if (keys['ArrowLeft'] || keys['a'] || keys['A']) { targetDir = DIR_LEFT; moved = true; }
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) { targetDir = DIR_RIGHT; moved = true; }

    if (moved) {
      player.dir = targetDir;
      const mx = dx[player.dir] * player.speed;
      const my = dy[player.dir] * player.speed;
      if (!checkCollision(player, mx, my)) {
        player.x += mx;
        player.y += my;
      }
    }

    if (keys[' '] || keys['Space']) {
      shoot(player, 'player');
    }

    if (player.shootCooldown > 0) player.shootCooldown--;
    player.animTimer += 0.1;
  }

  // ---- 敌人 AI ----
  for (const enemy of enemies) {
    if (!enemy.alive) continue;

    // 随机改变方向
    enemy.aiDirTimer++;
    if (enemy.aiDirTimer >= enemy.aiDirDuration) {
      enemy.aiDirTimer = 0;
      enemy.aiDirDuration = 40 + Math.floor(Math.random() * 80);
      // 有一定概率朝向玩家
      if (player && player.alive && Math.random() < 0.4) {
        const dxp = player.x - enemy.x;
        const dyp = player.y - enemy.y;
        if (Math.abs(dxp) > Math.abs(dyp)) {
          enemy.dir = dxp > 0 ? DIR_RIGHT : DIR_LEFT;
        } else {
          enemy.dir = dyp > 0 ? DIR_DOWN : DIR_UP;
        }
      } else {
        enemy.dir = Math.floor(Math.random() * 4);
      }
    }

    // 移动
    const mx = dx[enemy.dir] * enemy.speed;
    const my = dy[enemy.dir] * enemy.speed;
    if (!checkCollision(enemy, mx, my)) {
      enemy.x += mx;
      enemy.y += my;
    } else {
      // 撞墙则换方向
      enemy.aiDirTimer = enemy.aiDirDuration;
    }

    // 射击
    enemy.aiShootTimer++;
    if (enemy.aiShootTimer >= 30 + Math.floor(Math.random() * 30)) {
      enemy.aiShootTimer = 0;
      shoot(enemy, 'enemy');
    }

    if (enemy.shootCooldown > 0) enemy.shootCooldown--;
    enemy.animTimer += 0.08;
  }

  // ---- 子弹移动 ----
  for (const bullet of allBullets) {
    if (!bullet.alive) continue;
    bullet.x += dx[bullet.dir] * BULLET_SPEED;
    bullet.y += dy[bullet.dir] * BULLET_SPEED;

    // 边界检测
    if (bullet.x < 0 || bullet.x > W || bullet.y < 0 || bullet.y > H) {
      bullet.alive = false;
      continue;
    }

    // 地图碰撞
    const col = Math.floor(bullet.x / TILE_SIZE);
    const row = Math.floor(bullet.y / TILE_SIZE);
    const tile = getTile(col, row);

    if (isSolid(tile)) {
      bullet.alive = false;
      if (tile === 1) {
        // 砖墙被摧毁
        setTile(col, row, 0);
        spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#d4a574');
        sfxHit();
      } else if (tile === 2) {
        // 钢板打不穿
        spawnParticles(col * TILE_SIZE + TILE_SIZE / 2, row * TILE_SIZE + TILE_SIZE / 2, '#94a3b8');
        sfxHit();
      } else if (tile === 5) {
        // 击中基地！游戏结束
        setTile(col, row, 0);
        gameRunning = false;
        gameOver = true;
        sfxExplosion();
        setTimeout(() => showGameOver(false), 500);
      }
    }
  }

  // ---- 子弹与坦克碰撞 ----
  for (const bullet of allBullets) {
    if (!bullet.alive) continue;

    if (bullet.owner === 'player') {
      // 玩家子弹打敌人
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (bullet.collidesWith(enemy.getRect())) {
          bullet.alive = false;
          enemy.alive = false;
          spawnParticles(enemy.x, enemy.y, enemy.color);
          sfxExplosion();
          score += 100;
          // 概率掉落道具
          if (Math.random() < 0.2) {
            spawnPowerUp(enemy.x, enemy.y);
          }
          break;
        }
      }
    } else {
      // 敌人子弹打玩家
      if (player && player.alive && bullet.collidesWith(player.getRect())) {
        bullet.alive = false;
        player.alive = false;
        spawnParticles(player.x, player.y, player.color);
        sfxExplosion();
        lives--;
        if (lives <= 0) {
          gameRunning = false;
          gameOver = true;
          setTimeout(() => showGameOver(false), 800);
        } else {
          // 重生
          setTimeout(() => {
            if (gameRunning) {
              player = new Tank(10 * TILE_SIZE + TILE_SIZE / 2, 18 * TILE_SIZE + TILE_SIZE / 2, DIR_UP, '#4ade80', true);
              updateUI();
            }
          }, 1000);
        }
        updateUI();
      }

      // 敌人子弹互相碰撞检测
      for (const enemy of enemies) {
        if (!enemy.alive || enemy === bullet.owner) continue;
        if (bullet.collidesWith(enemy.getRect())) {
          bullet.alive = false;
          // 敌人子弹不打队友 (经典模式)
        }
      }
    }
  }

  // ---- 清理死亡对象 ----
  allBullets = allBullets.filter(b => b.alive);
  enemies = enemies.filter(e => e.alive);

  // ---- 道具收集 ----
  for (const pu of powerUps) {
    if (!pu.alive) continue;
    pu.timer++;
    if (pu.timer > 600) { pu.alive = false; continue; } // 10秒消失
    if (player && player.alive && pu.collidesWith(player.getRect())) {
      pu.alive = false;
      applyPowerUp(pu.type);
    }
  }
  powerUps = powerUps.filter(p => p.alive);

  // ---- 粒子动画 ----
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // ---- 胜利检测 ----
  if (enemies.length === 0 && gameRunning && !gameOver) {
    if (wave >= LEVEL_MAPS.length) {
      gameRunning = false;
      gameOver = true;
      victoryShown = true;
      score += 500;
      updateUI();
      setTimeout(() => showGameOver(true), 500);
    } else {
      // 下一关
      score += 200;
      nextWave();
    }
  }

  updateUI();
}

function applyPowerUp(type) {
  sfxPowerUp();
  switch (type) {
    case 'star':
      // 加速
      if (player) player.speed = Math.min(player.speed + 0.5, 5);
      break;
    case 'shield':
      score += 50;
      break;
    case 'bomb':
      // 炸毁所有敌人
      for (const enemy of enemies) {
        if (enemy.alive) {
          enemy.alive = false;
          spawnParticles(enemy.x, enemy.y, enemy.color);
          score += 100;
        }
      }
      sfxExplosion();
      break;
    case 'clock':
      // 冻结敌人 (暂停敌人移动几秒)
      for (const enemy of enemies) {
        enemy.aiDirDuration = 999;
        enemy.aiDirTimer = 0;
      }
      setTimeout(() => {
        for (const enemy of enemies) {
          enemy.aiDirDuration = 60;
        }
      }, 3000);
      break;
  }
  updateUI();
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// ---------- 渲染 ----------
function drawTile(col, row, tile) {
  const x = col * TILE_SIZE;
  const y = row * TILE_SIZE;

  switch (tile) {
    case 1: // 砖墙
      ctx.fillStyle = '#b45309';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#d97706';
      ctx.fillRect(x + 1, y + 1, TILE_SIZE / 2 - 1, TILE_SIZE / 2 - 1);
      ctx.fillRect(x + TILE_SIZE / 2 + 1, y + TILE_SIZE / 2 + 1, TILE_SIZE / 2 - 1, TILE_SIZE / 2 - 1);
      ctx.strokeStyle = '#92400e';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, y + 0.5, TILE_SIZE - 1, TILE_SIZE - 1);
      break;
    case 2: // 钢板
      ctx.fillStyle = '#64748b';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#94a3b8';
      ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
      ctx.fillStyle = '#cbd5e1';
      ctx.fillRect(x + 5, y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
      break;
    case 3: // 树丛
      ctx.fillStyle = '#166534';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#22c55e';
      for (let i = 0; i < 8; i++) {
        const lx = x + (i % 3) * 7 + 2;
        const ly = y + Math.floor(i / 3) * 7 + 2;
        ctx.beginPath();
        ctx.arc(lx, ly, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 4: // 水
      ctx.fillStyle = '#1e40af';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#3b82f6';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(x + 5 + i * 7, y + 6 + (i % 2) * 8, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 5: // 基地 (鹰)
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#fbbf24';
      // 鹰的简易绘制
      ctx.beginPath();
      ctx.moveTo(x + TILE_SIZE / 2, y + 3);
      ctx.lineTo(x + TILE_SIZE - 4, y + TILE_SIZE - 3);
      ctx.lineTo(x + TILE_SIZE / 2, y + TILE_SIZE - 6);
      ctx.lineTo(x + 4, y + TILE_SIZE - 3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#f59e0b';
      ctx.beginPath();
      ctx.arc(x + TILE_SIZE / 2, y + 5, 4, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
}

function drawTank(tank) {
  if (!tank.alive) return;
  ctx.save();
  ctx.translate(tank.x, tank.y);

  // 旋转方向
  const angles = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
  ctx.rotate(angles[tank.dir]);

  // 履带动画偏移
  const animOffset = Math.sin(tank.animTimer * 3) * 2;

  // 车身
  ctx.fillStyle = tank.color;
  ctx.fillRect(-HALF_TANK + 1, -HALF_TANK + 1, TANK_SIZE - 2, TANK_SIZE - 2);

  // 深色边框
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-HALF_TANK + 1, -HALF_TANK + 1, TANK_SIZE - 2, TANK_SIZE - 2);

  // 履带
  ctx.fillStyle = '#333';
  ctx.fillRect(-HALF_TANK, -HALF_TANK, 4, TANK_SIZE);
  ctx.fillRect(HALF_TANK - 4, -HALF_TANK, 4, TANK_SIZE);

  // 履带条纹
  ctx.fillStyle = '#555';
  for (let i = 0; i < 5; i++) {
    const sy = -HALF_TANK + 3 + i * 4;
    ctx.fillRect(-HALF_TANK, sy + animOffset, 4, 2);
    ctx.fillRect(HALF_TANK - 4, sy - animOffset, 4, 2);
  }

  // 炮塔
  const lighter = tank.isPlayer ? '#6ee7b7' : '#f87171';
  ctx.fillStyle = lighter;
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // 炮管
  ctx.fillStyle = lighter;
  ctx.fillRect(-2, -HALF_TANK, 4, HALF_TANK + 2);

  // 炮管尖端
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(-1.5, -HALF_TANK - 2, 3, 4);

  ctx.restore();
}

function drawBullet(bullet) {
  ctx.fillStyle = bullet.owner === 'player' ? '#fbbf24' : '#fca5a5';
  ctx.shadowColor = bullet.owner === 'player' ? '#fbbf24' : '#ef4444';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPowerUp(pu) {
  // 闪烁效果
  if (Math.floor(pu.timer / 15) % 2 === 0 && pu.timer > 500) return;

  ctx.save();
  ctx.translate(pu.x, pu.y);

  // 外框
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-10, -10, 20, 20);
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 2;
  ctx.strokeRect(-10, -10, 20, 20);

  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  switch (pu.type) {
    case 'star': ctx.fillText('⭐', 0, 0); break;
    case 'shield': ctx.fillText('🛡️', 0, 0); break;
    case 'bomb': ctx.fillText('💣', 0, 0); break;
    case 'clock': ctx.fillText('⏰', 0, 0); break;
  }

  ctx.restore();
}

function drawParticle(p) {
  const alpha = p.life / p.maxLife;
  ctx.fillStyle = p.color;
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(p.x, p.y, 2.5 * alpha, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function draw() {
  // 背景
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // 绘制地图
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const tile = getTile(col, row);
      if (tile !== 0) {
        drawTile(col, row, tile);
      }
    }
  }

  // 绘制道具
  for (const pu of powerUps) {
    if (pu.alive) drawPowerUp(pu);
  }

  // 绘制子弹
  for (const bullet of allBullets) {
    if (bullet.alive) drawBullet(bullet);
  }

  // 绘制敌人
  for (const enemy of enemies) {
    drawTank(enemy);
  }

  // 绘制玩家
  if (player) drawTank(player);

  // 绘制粒子
  for (const p of particles) {
    drawParticle(p);
  }

  // 暂停提示
  if (gamePaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停中', W / 2, H / 2);
    ctx.font = '16px "Courier New"';
    ctx.fillText('按 P 继续', W / 2, H / 2 + 40);
  }

  // 玩家死亡闪烁
  if (player && !player.alive && lives > 0 && gameRunning) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(0, 0, W, H);
  }
}

function showGameOver(won) {
  overlayPanel.innerHTML = `
    <h2>${won ? '🎉 恭喜胜利！' : '💥 游戏结束'}</h2>
    <p>${won ? '你消灭了所有敌人，保卫了基地！' : '基地被摧毁或生命耗尽...'}</p>
    <div class="score-final">🏆 ${score}</div>
    <p>波次: ${wave} | 关卡: ${Math.min(wave, LEVEL_MAPS.length)}</p>
    <button class="btn" onclick="restartGame()">🔄 再来一局</button>
  `;
  overlay.style.display = 'flex';
}

// ---------- 游戏循环 ----------
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ---------- 启动 ----------
function startGame() {
  initAudio();
  loadMap(0);
  spawnPlayer();
  spawnEnemies(4);
  gameRunning = true;
  gamePaused = false;
  gameOver = false;
  victoryShown = false;
  updateUI();
  overlay.style.display = 'none';
}

startGame();
gameLoop();

console.log('🎮 坦克大战已就绪！');
console.log('方向键移动 · 空格射击 · P暂停 · R重新开始');
</script>
